<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Nube de Palabras</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&family=Bangers&family=Indie+Flower&family=Montserrat:wght@700;900&family=Playfair+Display:wght@700;900&display=swap');

  :root {
    --bg: #f5f6fa;
    --card: #ffffff;
    --accent1: #e03131;
    --accent2: #f08c00;
    --accent3: #2f9e44;
    --accent4: #1971c2;
    --accent5: #e8590c;
    --accent6: #9c36b5;
    --accent7: #0c8599;
    --accent8: #c2255c;
    --text: #1a1a2e;
    --muted: #868e96;
    --border: #dee2e6;
    --cloud-font: 'Nunito', sans-serif;
  }

  /* TEACHER PANEL */
  .teacher-controls {
    width: 100%;
    max-width: 700px;
    margin-bottom: 20px;
    background: #ffffff;
    padding: 12px 20px;
    border-radius: 16px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 15px;
    z-index: 2;
    position: relative;
  }

  .teacher-label {
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .palette-selector {
    display: flex;
    gap: 8px;
    background: #f1f3f5;
    padding: 4px;
    border-radius: 12px;
  }

  .palette-btn {
    padding: 6px 14px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .palette-btn.active {
    background: white;
    background: var(--card);
    color: var(--accent4);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .teacher-controls { margin-bottom: 12px; padding: 10px 18px; }
  #stats-bar { margin-bottom: 12px; }

  .palette-preview {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }

  .preview-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .typography-selector {
    display: flex;
    gap: 6px;
    background: #f1f3f5;
    padding: 4px;
    border-radius: 12px;
    overflow-x: auto;
    max-width: 100%;
  }

  .font-btn {
    padding: 6px 12px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    white-space: nowrap;
  }

  .font-btn.active {
    background: white;
    color: var(--accent6);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
    overflow: hidden;
  }

  body::before { display: none; }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    background: linear-gradient(135deg, var(--accent4), var(--accent6), var(--accent1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 15px;
    text-align: center;
    z-index: 1;
    position: relative;
  }

  /* CLOUD AREA */
  #cloud-container {
    width: 100%;
    max-width: 700px;
    flex: 1;
    min-height: 0;
    position: relative;
    border-radius: 24px;
    background: #ffffff;
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08), inset 0 0 60px rgba(25,113,194,0.02);
    margin-bottom: 20px;
    overflow: hidden;
    z-index: 1;
  }

  .cloud-question {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    border-radius: 16px;
    font-weight: 800;
    color: var(--accent4);
    text-align: center;
    width: 85%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    border: 1px solid rgba(25, 113, 194, 0.1);
    animation: slideDown 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideDown {
    from { transform: translate(-50%, -20px); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }

  #cloud-canvas {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }

  .cloud-word {
    position: absolute;
    font-family: var(--cloud-font), sans-serif;
    font-weight: 900;
    cursor: default;
    transition: transform 0.15s ease;
    white-space: nowrap;
    user-select: none;
    transform-origin: center center;
    line-height: 1;
  }
  .cloud-word:hover { filter: brightness(1.3); }

  /* QUESTION CARD */
  #question-card {
    width: 100%;
    max-width: 700px;
    background: #ffffff;
    border-radius: 20px;
    padding: 24px 28px;
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    z-index: 1;
    position: relative;
  }

  .question-number {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent4);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .question-text {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .answer-slot {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .answer-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 700;
  }

  .answer-input {
    background: #f8f9fa;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
    text-align: center;
  }
  .answer-input::placeholder { color: var(--muted); font-weight: 400; }
  .answer-input:focus {
    border-color: var(--accent4);
    background: #e8f0fe;
  }
  .answer-input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent4), var(--accent6));
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 20px rgba(77,150,255,0.3);
  }
  .btn-submit:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(77,150,255,0.45);
  }
  .btn-submit:active:not(:disabled) { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-next {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent3), var(--accent7));
    border: none;
    border-radius: 14px;
    color: #0f0e1a;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 20px rgba(107,203,119,0.3);
    display: none;
    margin-top: 12px;
  }
  .btn-next:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(107,203,119,0.45);
  }

  /* STATS */
  #stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 700px;
    z-index: 1;
    position: relative;
  }

  .stat-pill {
    background: #ffffff;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 7px 16px;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* FEEDBACK BADGES */
  .feedback-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
    min-height: 32px;
  }

  .badge {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 700;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .badge-new { background: #dbe4ff; color: #1971c2; border: 1px solid #bac8ff; }
  .badge-repeat { background: #ffe8cc; color: #e8590c; border: 1px solid #ffd8a8; }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* WORD GROW EFFECT */
  @keyframes wordGrow {
    0% { transform: scale(1); filter: brightness(1); }
    40% { transform: scale(1.6); filter: brightness(2); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  .word-growing {
    animation: wordGrow 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* ROUND COMPLETE */
  .round-complete {
    text-align: center;
    padding: 10px 0 0;
    color: var(--accent3);
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  @media (max-width: 480px) {
    .answers-grid { grid-template-columns: 1fr; }
    #cloud-container { height: 260px; }
  }
</style>
</head>
<body>

<h1>☁️ Nube de Palabras</h1>
<p class="subtitle">Respondé y mirá crecer la nube</p>

<!-- PANEL DE DOCENTE -->
<div class="teacher-controls">
  <div class="teacher-label">
    🎨 Paleta de Colores
  </div>
  <div class="palette-selector" id="palette-selector">
    <button class="palette-btn active" data-palette="normal">
      Normal
      <div class="palette-preview">
        <div class="preview-dot" style="background:#e03131"></div>
        <div class="preview-dot" style="background:#2f9e44"></div>
        <div class="preview-dot" style="background:#1971c2"></div>
      </div>
    </button>
    <button class="palette-btn" data-palette="pastel">
      Pasteles
      <div class="palette-preview">
        <div class="preview-dot" style="background:#ffadad"></div>
        <div class="preview-dot" style="background:#9bf6ff"></div>
        <div class="preview-dot" style="background:#ffc6ff"></div>
      </div>
    </button>
    <button class="palette-btn" data-palette="frio">
      Fríos
      <div class="palette-preview">
        <div class="preview-dot" style="background:#05668d"></div>
        <div class="preview-dot" style="background:#02c39a"></div>
        <div class="preview-dot" style="background:#00b4d8"></div>
      </div>
    </button>
  </div>
</div>

<div class="teacher-controls" style="margin-top: -10px;">
  <div class="teacher-label">
    🅰️ Tipografía
  </div>
  <div class="typography-selector" id="font-selector">
    <button class="font-btn active" data-font="'Nunito', sans-serif" style="font-family:'Nunito'">Normal</button>
    <button class="font-btn" data-font="'Montserrat', sans-serif" style="font-family:'Montserrat'">Moderna</button>
    <button class="font-btn" data-font="'Bangers', cursive" style="font-family:'Bangers'">Divertida</button>
    <button class="font-btn" data-font="'Indie Flower', cursive" style="font-family:'Indie Flower'">Manuscrita</button>
    <button class="font-btn" data-font="'Playfair Display', serif" style="font-family:'Playfair Display'">Clásica</button>
  </div>
</div>

<div id="stats-bar">
  <div class="stat-pill">
    <div class="stat-dot" style="background:var(--accent2)"></div>
    <span id="stat-preguntas">Pregunta 1</span>
  </div>
  <div class="stat-pill">
    <div class="stat-dot" style="background:var(--accent3)"></div>
    <span id="stat-palabras">0 palabras únicas</span>
  </div>
</div>

<div id="cloud-container">
  <div class="cloud-question" id="cloud-q-text">...</div>
  <div id="cloud-canvas"></div>
</div>

<div id="question-card">
  <div class="question-number" id="q-number">PREGUNTA 1</div>
  <div class="question-text" id="q-text">Cargando...</div>
  <div class="answers-grid">
    <div class="answer-slot">
      <div class="answer-label">Respuesta 1</div>
      <input class="answer-input" id="ans1" type="text" placeholder="una palabra..." maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="answer-slot">
      <div class="answer-label">Respuesta 2</div>
      <input class="answer-input" id="ans2" type="text" placeholder="una palabra..." maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="answer-slot">
      <div class="answer-label">Respuesta 3</div>
      <input class="answer-input" id="ans3" type="text" placeholder="una palabra..." maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>
  <button class="btn-submit" id="btn-submit">✨ Enviar respuestas</button>
  <button class="btn-next" id="btn-next">➡️ Siguiente pregunta</button>
  <div class="feedback-row" id="feedback-row"></div>
</div>

<script>
// ─── QUESTIONS BANK ────────────────────────────────────────────
const QUESTIONS = [
  "¿Qué tres palabras describen cómo te sentís hoy?",
  "¿Qué tres cosas te hacen feliz?",
  "¿Qué tres palabras usarías para describir el verano?",
  "¿Qué tres valores son más importantes para vos?",
  "¿Qué tres palabras describen una buena amistad?",
  "¿Qué tres cosas no pueden faltarte en tu día?",
  "¿Qué tres palabras definen tu personalidad?",
  "¿Qué tres comidas preferís?",
  "¿Qué tres palabras describen tu lugar ideal para vivir?",
  "¿Qué tres cosas te dan energía?",
  "¿Qué tres palabras describen el mar?",
  "¿Qué tres actividades disfrutás en tu tiempo libre?",
];

// ─── COLOR PALETTES ────────────────────────────────────────────
const PALETTES = {
  normal: [
    '#e03131','#f08c00','#2f9e44','#1971c2',
    '#e8590c','#9c36b5','#0c8599','#c2255c',
    '#364fc7','#5c940d','#862e9c','#c92a2a',
  ],
  pastel: [
    '#ffadad','#ffd6a5','#fdffb6','#caffbf',
    '#9bf6ff','#a0c4ff','#bdb2ff','#ffc6ff',
    '#ffb7b2','#b2e2f2','#d9e4dd','#f4e1d2'
  ],
  frio: [
    '#05668d','#028090','#00a896','#02c39a',
    '#0077b6','#00b4d8','#90e0ef','#03045e',
    '#48cae4','#0096c7','#ade8f4','#caf0f8'
  ]
};

let currentPalette = 'normal';
let COLORS = PALETTES[currentPalette];

// ─── STATE ─────────────────────────────────────────────────────
const wordMap = {};      // word -> { count, color, el, x, y, fontSize }
let questionIndex = 0;
let usedQuestions = [];
let placedWords = [];    // { x, y, w, h, word }

// ─── DOM REFS ──────────────────────────────────────────────────
const canvas      = document.getElementById('cloud-canvas');
const qNumber     = document.getElementById('q-number');
const qText       = document.getElementById('q-text');
const ans1        = document.getElementById('ans1');
const ans2        = document.getElementById('ans2');
const ans3        = document.getElementById('ans3');
const btnSubmit   = document.getElementById('btn-submit');
const btnNext     = document.getElementById('btn-next');
const feedbackRow = document.getElementById('feedback-row');
const statPreg    = document.getElementById('stat-preguntas');
const statPalab   = document.getElementById('stat-palabras');
const cloudQText  = document.getElementById('cloud-q-text');

// ─── INIT ──────────────────────────────────────────────────────
function init() {
  loadQuestion();
  [ans1, ans2, ans3].forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const all = [ans1, ans2, ans3];
        const idx = all.indexOf(inp);
        if (idx < 2) all[idx + 1].focus();
        else submitAnswers();
      }
    });
  });
  btnSubmit.addEventListener('click', submitAnswers);
  btnNext.addEventListener('click', () => {
    questionIndex++;
    loadQuestion();
  });

  // Palette selector logic
  document.querySelectorAll('.palette-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      changePalette(btn.dataset.palette);
    });
  });

  // Font selector logic
  document.querySelectorAll('.font-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      changeFont(btn.dataset.font);
    });
  });
}

function changeFont(newFont) {
  document.documentElement.style.setProperty('--cloud-font', newFont);
  
  // Re-measure and re-place all words since sizes change
  canvas.innerHTML = '';
  placedWords = [];
  
  Object.keys(wordMap).forEach(word => {
    // Keep count and color, but we need new position properties
    const data = wordMap[word];
    data.el = null; // will be recreated in placeWord -> renderWord
    placeWord(word);
  });
}

function changePalette(newPalette) {
  currentPalette = newPalette;
  COLORS = PALETTES[currentPalette];

  // Update existing words
  Object.keys(wordMap).forEach((word, index) => {
    const data = wordMap[word];
    const newColor = COLORS[index % COLORS.length];
    data.color = newColor;
    if (data.el) {
      data.el.style.color = newColor;
    }
  });
}

function loadQuestion() {
  const shuffled = QUESTIONS.filter((_, i) => !usedQuestions.includes(i));
  if (shuffled.length === 0) {
    const msg = "¡Completaste todas las preguntas! La nube está lista 🎉";
    qText.textContent = msg;
    cloudQText.textContent = msg;
    btnSubmit.disabled = true;
    btnNext.style.display = 'none';
    [ans1, ans2, ans3].forEach(i => i.disabled = true);
    return;
  }
  // pick random unused
  const pick = Math.floor(Math.random() * shuffled.length);
  const realIdx = QUESTIONS.indexOf(shuffled[pick]);
  usedQuestions.push(realIdx);

  qNumber.textContent = `PREGUNTA ${questionIndex + 1}`;
  qText.textContent = QUESTIONS[realIdx];
  cloudQText.textContent = QUESTIONS[realIdx];
  statPreg.textContent = `Pregunta ${questionIndex + 1}`;

  [ans1, ans2, ans3].forEach(i => { i.value = ''; i.disabled = false; });
  feedbackRow.innerHTML = '';
  btnSubmit.style.display = 'block';
  btnSubmit.disabled = false;
  btnNext.style.display = 'none';
  ans1.focus();
}

// ─── SUBMIT ────────────────────────────────────────────────────
function submitAnswers() {
  const raw = [ans1.value, ans2.value, ans3.value];
  const words = raw
    .map(w => w.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""))
    .filter(w => w.length > 0 && /^[a-z]+$/.test(w));

  if (words.length === 0) {
    shakeCard();
    return;
  }

  feedbackRow.innerHTML = '';
  words.forEach(word => {
    const isNew = !wordMap[word];
    if (isNew) {
      const color = COLORS[Object.keys(wordMap).length % COLORS.length];
      wordMap[word] = { count: 1, color };
      placeWord(word);
    } else {
      wordMap[word].count++;
      growWord(word);
    }
    addBadge(word, isNew);
  });

  updateStats();
  [ans1, ans2, ans3].forEach(i => i.disabled = true);
  btnSubmit.style.display = 'none';
  btnNext.style.display = 'block';
}

// ─── CLOUD PLACEMENT ───────────────────────────────────────────
function getFontSize(word) {
  const count = wordMap[word].count;
  return Math.min(13 + count * 9, 68);
}

function measureWord(word, fontSize) {
  const tmp = document.createElement('span');
  const cloudFont = getComputedStyle(document.documentElement).getPropertyValue('--cloud-font');
  tmp.style.cssText = `position:absolute;visibility:hidden;white-space:nowrap;font-family:${cloudFont},sans-serif;font-weight:900;font-size:${fontSize}px;line-height:1`;
  tmp.textContent = word;
  document.body.appendChild(tmp);
  const w = tmp.offsetWidth;
  const h = tmp.offsetHeight;
  document.body.removeChild(tmp);
  return { w, h };
}

function overlaps(x, y, w, h, padding = 8) {
  for (const p of placedWords) {
    if (p.word === null) continue;
    if (
      x < p.x + p.w + padding &&
      x + w + padding > p.x &&
      y < p.y + p.h + padding &&
      y + h + padding > p.y
    ) return true;
  }
  return false;
}

function placeWord(word) {
  const fontSize = getFontSize(word);
  const { w, h } = measureWord(word, fontSize);
  const cW = canvas.offsetWidth;
  const cH = canvas.offsetHeight;

  let placed = false;
  // Spiral outward from center
  const cx = cW / 2 - w / 2;
  const cy = cH / 2 - h / 2;

  for (let r = 0; r < Math.max(cW, cH); r += 4) {
    for (let angle = 0; angle < Math.PI * 2; angle += 0.15) {
      const x = cx + r * Math.cos(angle) + (Math.random() - 0.5) * 6;
      const y = cy + r * Math.sin(angle) * 0.6 + (Math.random() - 0.5) * 6;
      if (x < 4 || y < 4 || x + w > cW - 4 || y + h > cH - 4) continue;
      if (!overlaps(x, y, w, h)) {
        renderWord(word, x, y, fontSize, w, h);
        placed = true;
        break;
      }
    }
    if (placed) break;
  }

  if (!placed) {
    // fallback: random with retries
    for (let i = 0; i < 80; i++) {
      const x = Math.random() * (cW - w - 8) + 4;
      const y = Math.random() * (cH - h - 8) + 4;
      if (!overlaps(x, y, w, h)) {
        renderWord(word, x, y, fontSize, w, h);
        placed = true;
        break;
      }
    }
  }

  if (!placed) {
    // Force place (ignore overlaps as last resort)
    const x = Math.random() * (cW - w - 8) + 4;
    const y = Math.random() * (cH - h - 8) + 4;
    renderWord(word, x, y, fontSize, w, h);
  }
}

function renderWord(word, x, y, fontSize, w, h) {
  const el = document.createElement('span');
  el.className = 'cloud-word';
  el.textContent = word;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.fontSize = fontSize + 'px';
  el.style.color = wordMap[word].color;
  el.style.opacity = '0';
  el.style.transform = 'scale(0.3)';
  canvas.appendChild(el);

  requestAnimationFrame(() => {
    el.style.transition = 'opacity 0.4s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1)';
    el.style.opacity = '1';
    el.style.transform = 'scale(1)';
  });

  wordMap[word].el = el;
  wordMap[word].x = x;
  wordMap[word].y = y;
  wordMap[word].w = w;
  wordMap[word].h = h;

  placedWords.push({ x, y, w, h, word });
}

function growWord(word) {
  const data = wordMap[word];
  if (!data.el) return;

  const oldFontSize = getFontSize(word) - 9; // before increment already done
  const newFontSize = getFontSize(word);
  const { w: newW, h: newH } = measureWord(word, newFontSize);

  // Try to reposition
  const cW = canvas.offsetWidth;
  const cH = canvas.offsetHeight;

  // Temporarily remove from placedWords
  const idx = placedWords.findIndex(p => p.word === word);
  if (idx !== -1) placedWords.splice(idx, 1);

  let placed = false;
  const cx = data.x + data.w / 2 - newW / 2;
  const cy = data.y + data.h / 2 - newH / 2;

  // Try nearby positions first
  const offsets = [[0,0],[2,2],[-2,-2],[4,0],[-4,0],[0,4],[0,-4]];
  for (const [dx, dy] of offsets) {
    const x = Math.max(4, Math.min(cW - newW - 4, cx + dx));
    const y = Math.max(4, Math.min(cH - newH - 4, cy + dy));
    if (!overlaps(x, y, newW, newH)) {
      updateWordPosition(word, x, y, newFontSize, newW, newH);
      placed = true;
      break;
    }
  }

  if (!placed) {
    // Spiral from current position
    for (let r = 0; r < Math.max(cW, cH); r += 5) {
      for (let angle = 0; angle < Math.PI * 2; angle += 0.2) {
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle) * 0.6;
        if (x < 4 || y < 4 || x + newW > cW - 4 || y + newH > cH - 4) continue;
        if (!overlaps(x, y, newW, newH)) {
          updateWordPosition(word, x, y, newFontSize, newW, newH);
          placed = true;
          break;
        }
      }
      if (placed) break;
    }
  }

  if (!placed) {
    // Just grow in place
    updateWordPosition(word, data.x, data.y, newFontSize, newW, newH);
  }

  // Animate grow
  data.el.classList.remove('word-growing');
  void data.el.offsetWidth;
  data.el.classList.add('word-growing');
  setTimeout(() => data.el.classList.remove('word-growing'), 700);
}

function updateWordPosition(word, x, y, fontSize, w, h) {
  const data = wordMap[word];
  data.el.style.transition = 'left 0.5s ease, top 0.5s ease, font-size 0.4s ease';
  data.el.style.left = x + 'px';
  data.el.style.top = y + 'px';
  data.el.style.fontSize = fontSize + 'px';
  data.x = x;
  data.y = y;
  data.w = w;
  data.h = h;
  placedWords.push({ x, y, w, h, word });
}

// ─── UI HELPERS ────────────────────────────────────────────────
function addBadge(word, isNew) {
  const badge = document.createElement('span');
  badge.className = 'badge ' + (isNew ? 'badge-new' : 'badge-repeat');
  badge.textContent = isNew
    ? `✨ "${word}" — nueva`
    : `🔥 "${word}" ×${wordMap[word].count}`;
  feedbackRow.appendChild(badge);
}

function updateStats() {
  const unique = Object.keys(wordMap).length;
  statPalab.textContent = `${unique} palabra${unique !== 1 ? 's' : ''} única${unique !== 1 ? 's' : ''}`;
}

function shakeCard() {
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.style.transition = 'transform 0.1s';
  const seq = [6, -6, 4, -4, 2, 0];
  seq.forEach((v, i) => {
    setTimeout(() => card.style.transform = `translateX(${v}px)`, i * 60);
  });
  setTimeout(() => card.style.transform = '', seq.length * 60);
}

// ─── START ─────────────────────────────────────────────────────
window.addEventListener('load', init);
</script>
