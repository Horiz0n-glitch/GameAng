version: '3.8'

services:
  quizmaster:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # These build args are injected by Dokploy at build time from Environment Variables
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
        - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
        - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
        - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
        - VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
    image: quizmaster:latest
    container_name: quizmaster_app
    restart: unless-stopped
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      # Dokploy / Traefik labels for automatic HTTPS
      - "traefik.enable=true"
      - "traefik.http.routers.quizmaster.rule=Host(`quizmaster.horizonsoftware.com.ar`)"
      - "traefik.http.routers.quizmaster.entrypoints=websecure"
      - "traefik.http.routers.quizmaster.tls.certresolver=letsencrypt"
      - "traefik.http.services.quizmaster.loadbalancer.server.port=80"
